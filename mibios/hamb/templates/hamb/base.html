{%load static%}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{%block title%}{%endblock%}</title>
    {%block head_links_and_scripts%}
    <link rel="stylesheet" href="{% static 'hamb/css/bootstrap.min.css' %}">
    {%endblock%}
</head>
<body>

    <div class="container-fluid">
        <nav class="navbar navbar-expand-md navbar dark navbar-main">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsible-navlist">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="collapsible-navlist">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link" href="{% url 'dataset_list' %}">Studies/Datasets</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'sample_list' %}">Samples</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'tax_browser_root' %}">Taxonomy</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container-fluid py-4">
            {%block notifications%}{%endblock%}
            {%block content%}{%endblock%}
        </div>

        <footer class="d-flex flex-wrap justify-content-center py-2 mt-4 border-top">
            <a href="https://umich.edu/" class="text-muted text-decoration-none mx-4">University of Michigan</a>
            <span class="text-muted">© 2025 <a href="https://regents.umich.edu/" class="text-muted text-decoration-none">Regents of the University of Michigan</a></span>
        </footer>

    </div>
</body>
</html>
